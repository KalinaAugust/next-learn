<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#f5f0e8"/>

  <!-- Outer circle (Da Vinci style) -->
  <circle cx="50" cy="46" r="38" fill="none" stroke="#8b6914" stroke-width="1.2"/>

  <!-- Square (rotated slightly to show both) -->
  <rect x="14" y="10" width="72" height="72" fill="none" stroke="#8b6914" stroke-width="1.2"/>

  <!-- Body torso -->
  <line x1="50" y1="28" x2="50" y2="62" stroke="#3d2b0a" stroke-width="2" stroke-linecap="round"/>

  <!-- Head circle -->
  <circle cx="50" cy="23" r="7" fill="none" stroke="#3d2b0a" stroke-width="2"/>

  <!-- Arms horizontal (outstretched) -->
  <line x1="18" y1="40" x2="82" y2="40" stroke="#3d2b0a" stroke-width="2" stroke-linecap="round"/>

  <!-- Arms diagonal (raised) -->
  <line x1="24" y1="22" x2="50" y2="40" stroke="#3d2b0a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="76" y1="22" x2="50" y2="40" stroke="#3d2b0a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Legs spread (wide stance) -->
  <line x1="50" y1="62" x2="26" y2="84" stroke="#3d2b0a" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="62" x2="74" y2="84" stroke="#3d2b0a" stroke-width="2" stroke-linecap="round"/>

  <!-- Legs together (narrow stance) -->
  <line x1="50" y1="62" x2="38" y2="84" stroke="#3d2b0a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="62" x2="62" y2="84" stroke="#3d2b0a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Horizontal guide line through center -->
  <line x1="14" y1="40" x2="86" y2="40" stroke="#8b6914" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.5"/>
</svg>
